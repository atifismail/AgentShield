# Datasource connection details are supplied dynamically by Testcontainers via @ServiceConnection
# (see com.agentshield.support.AbstractIntegrationTest) — nothing to configure here.
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration/mariadb

agentshield:
  security:
    default-admin-username: admin
    default-admin-password: test-only
  mcp:
    # A fixed, obviously-not-a-real-secret 32-byte key so MCP OAuth token-caching tests can
    # exercise the encrypted-cache path without every test needing to configure its own.
    oauth-token-encryption-key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
