# Activated via SPRING_PROFILES_ACTIVE=prod. Secure-by-default overrides for a real deployment
# (improvement_plan.md #10). Do not combine with the "demo" profile — AdminUserInitializer
# refuses to start if both are active.
spring:
  thymeleaf:
    cache: true

server:
  # The prod profile assumes (and docs/deployment.md requires) a TLS-terminating reverse
  # proxy/ingress in front of the app — see docs/tls-configuration.md. "framework" tells Spring to
  # trust X-Forwarded-Proto/X-Forwarded-For/X-Forwarded-Host from the immediate upstream when
  # building redirect URLs and deciding whether a request is secure; without it, a proxy correctly
  # terminating TLS still looks like a plain-HTTP request to the app, which can break the Secure
  # session cookie below and produce http:// redirect URLs behind an https:// proxy. Only safe
  # because prod is documented as always sitting behind a proxy that overwrites (not merges)
  # client-supplied X-Forwarded-* headers — exposing this profile directly to untrusted clients
  # without a proxy in front would let a client spoof "secure" status via those same headers.
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true
        http-only: true

# Off by default in production (improvement_plan.md #13) — the schema/UI can reveal internal
# route shapes and example payloads that aren't meant for a public audience. An operator who
# wants it anyway (e.g. an internal-only deployment) can set AGENTSHIELD_ENABLE_API_DOCS=true.
springdoc:
  api-docs:
    enabled: ${AGENTSHIELD_ENABLE_API_DOCS:false}
  swagger-ui:
    enabled: ${AGENTSHIELD_ENABLE_API_DOCS:false}

management:
  endpoints:
    web:
      # Narrower than the default profile's health,info,prometheus,metrics — info/metrics can
      # leak build/environment details an operator wouldn't want publicly reachable. prometheus
      # stays in because docs/operations.md documents scraping it as the supported monitoring
      # path; lock it down at the network layer (internal-only scrape target) rather than here.
      exposure:
        include: health,prometheus

agentshield:
  gateway:
    outbound:
      # Deny-by-default in production: only registered tools whose host is on the explicit
      # allowlist are reachable, full stop — no "any public host that doesn't resolve to a
      # private range" fallback like the default profile allows.
      deny-all-unless-allowed: true
  # If enabling stdio MCP transport in production (AGENTSHIELD_STDIO_ENABLED=true), the app
  # refuses to start unless AGENTSHIELD_STDIO_EXTERNAL_SANDBOX_ACKNOWLEDGED=true is also set,
  # confirming subprocess isolation (network egress, resource limits) is enforced externally —
  # see docs/operations.md and design-stdio-sse-mcp-transport-and-sandboxing.md §6a/§14.
  stdio:
    enabled: ${AGENTSHIELD_STDIO_ENABLED:false}
    external-sandbox-acknowledged: ${AGENTSHIELD_STDIO_EXTERNAL_SANDBOX_ACKNOWLEDGED:false}
