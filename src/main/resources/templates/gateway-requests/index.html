<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(title='Gateway Requests')}"></head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>
<main class="container-fluid py-4">
    <h1 class="h3 mb-3">Gateway Requests</h1>
    <div class="card">
        <div class="card-body">
            <table class="table table-hover align-middle data-table">
                <thead>
                <tr>
                    <th>Created</th>
                    <th>Agent</th>
                    <th>Tool</th>
                    <th>Action</th>
                    <th>Category</th>
                    <th>Environment</th>
                    <th>Status</th>
                    <th>Correlation</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${requestsPage.content}">
                    <td th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm:ss')}">-</td>
                    <td th:text="${r.agent != null ? r.agent.name : '-'}">agent-01</td>
                    <td th:text="${r.tool != null ? r.tool.name : '(unregistered)'}">mock-git</td>
                    <td th:text="${r.actionName}">commit</td>
                    <td th:text="${r.actionCategory}">WRITE</td>
                    <td th:text="${r.targetEnvironment}">DEV</td>
                    <td><span class="badge" th:classappend="'status-badge-' + ${#strings.toLowerCase(r.status)}" th:text="${r.status}">ALLOWED</span></td>
                    <td>
                        <a th:href="@{'/audit/correlation/' + ${r.correlationId}}" class="text-monospace-sm" th:text="${#strings.substring(r.correlationId, 0, 8)} + '…'">abcd1234…</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{layout/fragments :: scripts}"></div>
</body>
</html>
