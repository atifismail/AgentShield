<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(title='Audit timeline')}"></head>
<body>
<div th:replace="~{layout/fragments :: sidebar}"></div>
<div class="app-shell">
<div th:replace="~{layout/fragments :: topbar}"></div>
<main class="app-main">
    <p><a th:href="@{/audit}">&larr; Back to audit</a></p>
    <h1 class="h4 mb-3">Timeline for <code th:text="${correlationId}">correlation-id</code></h1>

    <ul class="list-group">
        <li class="list-group-item" th:each="e : ${events}">
            <div class="d-flex justify-content-between">
                <strong th:text="${e.eventType}">gateway.request_received</strong>
                <span class="badge" th:classappend="'status-badge-' + ${#strings.toLowerCase(e.severity)}" th:text="${e.severity}">INFO</span>
            </div>
            <div class="text-secondary small" th:text="${#temporals.format(e.createdAt, 'yyyy-MM-dd HH:mm:ss.SSS')}">-</div>
            <div th:text="${e.message}">message</div>
        </li>
    </ul>
</main>
</div>
<div th:replace="~{layout/fragments :: scripts}"></div>
</body>
</html>
