<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(title='Policies')}"></head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>
<main class="container-fluid py-4">
    <h1 class="h3 mb-3">Policies</h1>
    <div id="alertHost"></div>

    <div class="row g-3">
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header">Versions</div>
                <div class="card-body">
                    <table class="table table-hover align-middle data-table">
                        <thead>
                        <tr><th>Name</th><th>Version</th><th>Mode</th><th>Enabled</th><th>Created by</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${policies}" th:attr="data-policy-id=${p.id}">
                            <td th:text="${p.name}">default-policy</td>
                            <td th:text="${p.version}">1</td>
                            <td th:text="${p.mode}">ENFORCE</td>
                            <td>
                                <span class="badge" th:classappend="${p.enabled} ? 'status-badge-approved' : 'status-badge-pending'"
                                      th:text="${p.enabled} ? 'ENABLED' : 'DISABLED'">ENABLED</span>
                            </td>
                            <td th:text="${p.createdBy}">system</td>
                            <td>
                                <button type="button" class="btn btn-sm btn-outline-success btn-toggle" th:if="${!p.enabled}">Enable</button>
                                <button type="button" class="btn btn-sm btn-outline-secondary btn-toggle-off" th:if="${p.enabled}">Disable</button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header">Dry-run a request</div>
                <div class="card-body">
                    <form id="dryRunForm">
                        <div class="mb-2">
                            <label class="form-label small">Agent ID</label>
                            <input type="number" class="form-control form-control-sm" name="agentId" required/>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Tool ID</label>
                            <input type="number" class="form-control form-control-sm" name="toolId" required/>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Action category</label>
                            <select class="form-select form-select-sm" name="actionCategory">
                                <option th:each="c : ${actionCategories}" th:value="${c}" th:text="${c}"></option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Target environment</label>
                            <input type="text" class="form-control form-control-sm" name="targetEnvironment" placeholder="DEV"/>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Payload size (bytes)</label>
                            <input type="number" class="form-control form-control-sm" name="payloadSizeBytes" value="10"/>
                        </div>
                        <button type="submit" class="btn btn-sm btn-primary">Evaluate</button>
                    </form>
                    <div id="dryRunResult" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout/fragments :: scripts}"></div>
<script th:src="@{/js/policies.js}"></script>
</body>
</html>
