<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(title='Approvals')}"></head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>
<main class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Approvals</h1>
        <div class="btn-group">
            <a th:href="@{/approvals(pendingOnly=true)}" class="btn btn-sm" th:classappend="${pendingOnly} ? 'btn-primary' : 'btn-outline-primary'">Pending only</a>
            <a th:href="@{/approvals(pendingOnly=false)}" class="btn btn-sm" th:classappend="${pendingOnly} ? 'btn-outline-primary' : 'btn-primary'">All</a>
        </div>
    </div>

    <div id="alertHost"></div>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover align-middle data-table">
                <thead>
                <tr>
                    <th>Requested</th>
                    <th>Agent</th>
                    <th>Tool</th>
                    <th>Action</th>
                    <th>Risk</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${approvals}" th:attr="data-approval-id=${a.id}">
                    <td th:text="${#temporals.format(a.createdAt, 'yyyy-MM-dd HH:mm')}">-</td>
                    <td th:text="${a.gatewayRequest.agent.name}">agent-01</td>
                    <td th:text="${a.gatewayRequest.tool != null ? a.gatewayRequest.tool.name : '-'}">mock-database</td>
                    <td th:text="${a.gatewayRequest.actionName}">deleteRecords</td>
                    <td th:text="${a.gatewayRequest.actionCategory}">WRITE</td>
                    <td th:text="${a.reason}">reason</td>
                    <td><span class="badge" th:classappend="'status-badge-' + ${#strings.toLowerCase(a.status)}" th:text="${a.status}">PENDING</span></td>
                    <td>
                        <div class="btn-group btn-group-sm" th:if="${a.status.name() == 'PENDING'}">
                            <button type="button" class="btn btn-outline-success btn-approve">Approve</button>
                            <button type="button" class="btn btn-outline-danger btn-reject">Reject</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{layout/fragments :: scripts}"></div>
<script th:inline="javascript">
    var currentUser = /*[[${#authentication.name}]]*/ 'admin';

    function showAlert(message, type) {
        $('#alertHost').html('<div class="alert alert-' + type + ' alert-dismissible fade show" role="alert">' +
            message + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>');
    }

    $('table').on('click', '.btn-approve, .btn-reject', function () {
        var id = $(this).closest('tr').data('approval-id');
        var action = $(this).hasClass('btn-approve') ? 'approve' : 'reject';
        $.ajax({
            url: '/api/approvals/' + id + '/' + action, method: 'POST', contentType: 'application/json',
            data: JSON.stringify({decidedBy: currentUser})
        }).done(function () { location.reload(); })
            .fail(function (xhr) { showAlert('Action failed: ' + (xhr.responseJSON ? xhr.responseJSON.error : xhr.statusText), 'danger'); });
    });
</script>
</body>
</html>
