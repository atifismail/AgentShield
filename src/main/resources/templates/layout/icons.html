<!DOCTYPE html>
<!--/*
    Self-contained line-icon set (24x24, stroke-based, stroke="currentColor" so every icon
    inherits its container's color and adapts to the light/dark theme automatically). Hand-drawn
    with basic SVG primitives rather than vendored from an icon font/library, so there is nothing
    to fetch and no licensing question — consistent with this project's "vendor everything
    locally, no CDN" rule (AGENTS.md) without adding a new vendored dependency at all.

    Usage: th:replace="~{layout/icons :: icon(name='dashboard')}"
*/-->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<svg th:fragment="icon(name)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
     aria-hidden="true" th:switch="${name}">
    <g th:case="'dashboard'">
        <rect x="3" y="3" width="7" height="9" rx="1.5"/>
        <rect x="14" y="3" width="7" height="5" rx="1.5"/>
        <rect x="14" y="12" width="7" height="9" rx="1.5"/>
        <rect x="3" y="16" width="7" height="5" rx="1.5"/>
    </g>
    <g th:case="'agents'">
        <circle cx="12" cy="8" r="3.25"/>
        <path d="M4.5 20c1.4-3.6 4.2-5.5 7.5-5.5s6.1 1.9 7.5 5.5"/>
    </g>
    <g th:case="'tools'">
        <path d="M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 1 5.4-5.4l-2.3 2.3-2-2 2.3-2.3z"/>
    </g>
    <g th:case="'mcp'">
        <rect x="3.5" y="4" width="17" height="6" rx="1.5"/>
        <rect x="3.5" y="14" width="17" height="6" rx="1.5"/>
        <circle cx="7" cy="7" r=".6" fill="currentColor" stroke="none"/>
        <circle cx="7" cy="17" r=".6" fill="currentColor" stroke="none"/>
    </g>
    <g th:case="'requests'">
        <polyline points="3 12 8 12 10 6 14 18 16 12 21 12"/>
    </g>
    <g th:case="'approvals'">
        <circle cx="12" cy="12" r="8.25"/>
        <path d="m8.5 12.5 2.3 2.3 4.7-5"/>
    </g>
    <g th:case="'policies'">
        <path d="M12 3.5 5 6v5.5c0 4.6 3 7.6 7 9 4-1.4 7-4.4 7-9V6l-7-2.5Z"/>
        <path d="m9 12 2.2 2.2L15.5 10"/>
    </g>
    <g th:case="'audit'">
        <rect x="5" y="4" width="14" height="16" rx="2"/>
        <rect x="9" y="2.3" width="6" height="3" rx="1"/>
        <path d="M8.5 11h7M8.5 14.5h7M8.5 18h4"/>
    </g>
    <g th:case="'incidents'">
        <path d="M12 4 21.5 20H2.5Z"/>
        <path d="M12 10v4"/>
        <circle cx="12" cy="17" r=".9" fill="currentColor" stroke="none"/>
    </g>
    <g th:case="'dlp'">
        <rect x="5" y="11" width="14" height="9" rx="2"/>
        <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
    </g>
    <g th:case="'codetrust'">
        <polyline points="9 7 4 12 9 17"/>
        <polyline points="15 7 20 12 15 17"/>
    </g>
    <g th:case="'governance'">
        <path d="M5 20v-6M11 20V7M17 20v-9"/>
        <path d="M2.5 20.5h19"/>
    </g>
    <g th:case="'coverage'">
        <circle cx="12" cy="12" r="8.25"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
    </g>
    <g th:case="'validation'">
        <path d="M9.5 3h5M10 3v6.2L4.8 19a2 2 0 0 0 1.8 3h10.8a2 2 0 0 0 1.8-3L14 9.2V3"/>
        <path d="M7.5 15h9"/>
    </g>
    <g th:case="'sun'">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2.5v2.2M12 19.3v2.2M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6"/>
    </g>
    <g th:case="'moon'">
        <path d="M20 14.3A8.5 8.5 0 1 1 9.7 4a7 7 0 0 0 10.3 10.3Z"/>
    </g>
    <g th:case="'menu'">
        <path d="M4 6h16M4 12h16M4 18h16"/>
    </g>
    <g th:case="'close'">
        <path d="m5 5 14 14M19 5 5 19"/>
    </g>
    <g th:case="'user'">
        <circle cx="12" cy="8.5" r="3.25"/>
        <path d="M4.75 19.5c1.3-3.4 4-5.2 7.25-5.2s5.95 1.8 7.25 5.2"/>
    </g>
    <g th:case="'logout'">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <path d="m16 17 5-5-5-5"/>
        <path d="M21 12H9"/>
    </g>
    <g th:case="'collapse'">
        <polyline points="15 6 9 12 15 18"/>
    </g>
    <g th:case="'blocked'">
        <circle cx="12" cy="12" r="8.25"/>
        <path d="m9 9 6 6M15 9l-6 6"/>
    </g>
    <g th:case="'inbox'">
        <path d="M3.5 12h5l1.5 3h4l1.5-3h5"/>
        <path d="M5.5 6h13l2 6v7a1.5 1.5 0 0 1-1.5 1.5h-14A1.5 1.5 0 0 1 3.5 19v-7Z"/>
    </g>
</svg>
</body>
</html>
