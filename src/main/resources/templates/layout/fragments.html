<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!--/* head fragment: usage th:replace="~{layout/fragments :: head(title='X')}" */-->
    <th:block th:fragment="head(title)">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title th:text="${title} + ' | AgentShield'">AgentShield</title>
        <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}"/>
        <link rel="stylesheet" th:href="@{/vendor/datatables/dataTables.bootstrap5.min.css}"/>
        <link rel="stylesheet" th:href="@{/css/theme.css}"/>
        <link rel="stylesheet" th:href="@{/css/layout.css}"/>
        <link rel="stylesheet" th:href="@{/css/app.css}"/>
        <!-- Applies the saved/system color theme before first paint. External file (not an
             inline script) so it runs under this app's strict CSP (script-src 'self', no
             unsafe-inline) while still executing early enough to avoid a light-theme flash. -->
        <script th:src="@{/js/theme-init.js}"></script>
    </th:block>
</head>
<body>
    <!--/* Sidebar + mobile backdrop: usage th:replace="~{layout/fragments :: sidebar}" */-->
    <th:block th:fragment="sidebar">
        <aside class="app-sidebar" id="appSidebar">
            <div class="sidebar-brand">
                <a class="brand-link" th:href="@{/dashboard}">
                    <span class="brand-mark">AS</span>
                    <span class="brand-text">AgentShield</span>
                </a>
                <button type="button" class="sidebar-close" id="sidebarClose" aria-label="Close menu">
                    <span th:insert="~{layout/icons :: icon(name='close')}"></span>
                </button>
            </div>
            <div class="sidebar-collapse-row">
                <button type="button" class="sidebar-collapse-btn" id="sidebarCollapseToggle"
                        aria-label="Collapse sidebar" title="Collapse sidebar" aria-pressed="false">
                    <span th:insert="~{layout/icons :: icon(name='collapse')}"></span>
                </button>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <div class="nav-group">
                    <div class="nav-group-title">Overview</div>
                    <a class="nav-link" th:href="@{/dashboard}">
                        <span th:insert="~{layout/icons :: icon(name='dashboard')}"></span>
                        <span class="nav-link-text">Dashboard</span>
                    </a>
                </div>
                <div class="nav-group">
                    <div class="nav-group-title">Agents &amp; Tools</div>
                    <a class="nav-link" th:href="@{/agents}">
                        <span th:insert="~{layout/icons :: icon(name='agents')}"></span>
                        <span class="nav-link-text">Agents</span>
                    </a>
                    <a class="nav-link" th:href="@{/tools}">
                        <span th:insert="~{layout/icons :: icon(name='tools')}"></span>
                        <span class="nav-link-text">Tools</span>
                    </a>
                    <a class="nav-link" th:href="@{/mcp-servers}">
                        <span th:insert="~{layout/icons :: icon(name='mcp')}"></span>
                        <span class="nav-link-text">MCP Servers</span>
                    </a>
                </div>
                <div class="nav-group">
                    <div class="nav-group-title">Gateway &amp; Policy</div>
                    <a class="nav-link" th:href="@{/gateway-requests}">
                        <span th:insert="~{layout/icons :: icon(name='requests')}"></span>
                        <span class="nav-link-text">Requests</span>
                    </a>
                    <a class="nav-link" th:href="@{/approvals}">
                        <span th:insert="~{layout/icons :: icon(name='approvals')}"></span>
                        <span class="nav-link-text">Approvals</span>
                    </a>
                    <a class="nav-link" th:href="@{/policies}">
                        <span th:insert="~{layout/icons :: icon(name='policies')}"></span>
                        <span class="nav-link-text">Policies</span>
                    </a>
                </div>
                <div class="nav-group">
                    <div class="nav-group-title">Security &amp; Compliance</div>
                    <a class="nav-link" th:href="@{/audit}">
                        <span th:insert="~{layout/icons :: icon(name='audit')}"></span>
                        <span class="nav-link-text">Audit</span>
                    </a>
                    <a class="nav-link" th:href="@{/incidents}">
                        <span th:insert="~{layout/icons :: icon(name='incidents')}"></span>
                        <span class="nav-link-text">Incidents</span>
                    </a>
                    <a class="nav-link" th:href="@{/dlp}">
                        <span th:insert="~{layout/icons :: icon(name='dlp')}"></span>
                        <span class="nav-link-text">DLP</span>
                    </a>
                    <a class="nav-link" th:href="@{/codetrust}">
                        <span th:insert="~{layout/icons :: icon(name='codetrust')}"></span>
                        <span class="nav-link-text">Code Trust</span>
                    </a>
                    <a class="nav-link" th:href="@{/governance}">
                        <span th:insert="~{layout/icons :: icon(name='governance')}"></span>
                        <span class="nav-link-text">Governance</span>
                    </a>
                    <a class="nav-link" th:href="@{/siem/coverage}">
                        <span th:insert="~{layout/icons :: icon(name='coverage')}"></span>
                        <span class="nav-link-text">Detection Coverage</span>
                    </a>
                    <a class="nav-link" th:href="@{/siem/validation}">
                        <span th:insert="~{layout/icons :: icon(name='validation')}"></span>
                        <span class="nav-link-text">SOC Validation</span>
                    </a>
                </div>
            </nav>
        </aside>
        <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    </th:block>

    <!--/* Topbar: usage th:replace="~{layout/fragments :: topbar}" */-->
    <header class="app-topbar" th:fragment="topbar">
        <button type="button" class="topbar-toggle" id="sidebarToggle" aria-label="Open menu"
                aria-controls="appSidebar" aria-expanded="false">
            <span th:insert="~{layout/icons :: icon(name='menu')}"></span>
        </button>
        <div class="topbar-spacer"></div>
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle color theme">
            <span class="theme-icon-light" th:insert="~{layout/icons :: icon(name='sun')}"></span>
            <span class="theme-icon-dark" th:insert="~{layout/icons :: icon(name='moon')}"></span>
        </button>
        <div class="topbar-user" sec:authorize="isAuthenticated()" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
            <span class="topbar-username">
                <span class="topbar-username-avatar" id="currentUserAvatar">U</span>
                <span id="currentUserName" sec:authentication="name">user</span>
            </span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="topbar-logout" aria-label="Sign out" title="Sign out">
                    <span th:insert="~{layout/icons :: icon(name='logout')}"></span>
                </button>
            </form>
        </div>
    </header>

    <th:block th:fragment="scripts">
        <script th:src="@{/vendor/jquery/jquery-3.7.1.min.js}"></script>
        <script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
        <script th:src="@{/vendor/datatables/jquery.dataTables.min.js}"></script>
        <script th:src="@{/vendor/datatables/dataTables.bootstrap5.min.js}"></script>
        <script th:src="@{/vendor/chartjs/chart.umd.min.js}"></script>
        <script th:src="@{/js/app.js}"></script>
    </th:block>
</body>
</html>
