<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!--/* head fragment: usage th:replace="~{layout/fragments :: head(title='X')}" */-->
    <th:block th:fragment="head(title)">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title th:text="${title} + ' | AgentShield'">AgentShield</title>
        <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}"/>
        <link rel="stylesheet" th:href="@{/vendor/datatables/dataTables.bootstrap5.min.css}"/>
        <link rel="stylesheet" th:href="@{/css/app.css}"/>
    </th:block>
</head>
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" th:href="@{/dashboard}">AgentShield</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/agents}">Agents</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/tools}">Tools</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/mcp-servers}">MCP</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/gateway-requests}">Requests</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/approvals}">Approvals</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/policies}">Policies</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/audit}">Audit</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/incidents}">Incidents</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/dlp}">DLP</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/codetrust}">Code Trust</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/governance}">Governance</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/siem/coverage}">Detection Coverage</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/siem/validation}">SOC Validation</a></li>
                </ul>
                <ul class="navbar-nav" sec:authorize="isAuthenticated()" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                    <li class="nav-item">
                        <span class="navbar-text text-secondary me-3" id="currentUserName" sec:authentication="name">user</span>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm">Sign out</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <th:block th:fragment="scripts">
        <script th:src="@{/vendor/jquery/jquery-3.7.1.min.js}"></script>
        <script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
        <script th:src="@{/vendor/datatables/jquery.dataTables.min.js}"></script>
        <script th:src="@{/vendor/datatables/dataTables.bootstrap5.min.js}"></script>
        <script th:src="@{/vendor/chartjs/chart.umd.min.js}"></script>
        <script th:src="@{/js/app.js}"></script>
    </th:block>
</body>
</html>
