replicaCount: 2

image:
  repository: agentshield
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  host: agentshield.local
  tls: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

env:
  AGENTSHIELD_PORT: "8080"

database:
  url: "jdbc:postgresql://agentshield-postgres:5432/agentshield"
  existingSecret: "agentshield-db-credentials"
  usernameKey: "username"
  passwordKey: "password"

admin:
  existingSecret: "agentshield-admin-credentials"
  usernameKey: "username"
  passwordKey: "password"

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 15
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 20
    periodSeconds: 10
